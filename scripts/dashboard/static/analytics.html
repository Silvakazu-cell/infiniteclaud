<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>InfiniteClaud — Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --dim:#7d8590;
            --blue:#58a6ff; --green:#3fb950; --yellow:#d29922; }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'SF Mono',monospace; font-size:13px; }
    .header { padding:16px 24px; border-bottom:1px solid var(--border); }
    .header h1 { font-size:16px; color:var(--blue); }
    .container { padding:24px; max-width:1100px; margin:0 auto; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:16px; }
    .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:1px;
               color:var(--dim); margin-bottom:12px; }
    .roi-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
    .roi-item label { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; display:block; }
    .roi-item span { font-size:22px; font-weight:700; color:var(--green); }
    canvas { max-height:220px; }
    .no-data { color:var(--dim); text-align:center; padding:40px 0; }
    a.nav { color:var(--blue); text-decoration:none; font-size:12px; margin-right:16px; }
    .suggestions { margin-top:16px; }
    .suggestion-item { background:var(--card); border:1px solid var(--yellow); border-radius:6px;
                       padding:12px 16px; margin-bottom:8px; }
    .suggestion-item p { color:var(--text); font-size:12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>InfiniteClaud — Pair Intelligence Analytics</h1>
    <div style="margin-top:6px">
      <a class="nav" href="/">Dashboard</a>
      <a class="nav" href="/agents">Agentes</a>
    </div>
  </div>
  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Tokens por Categoria</h2>
        <canvas id="catChart"></canvas>
        <div id="catNoData" class="no-data" style="display:none">Sem dados ainda</div>
      </div>
      <div class="card">
        <h2>Distribuição de Modelos</h2>
        <canvas id="modelChart"></canvas>
        <div id="modelNoData" class="no-data" style="display:none">Sem dados ainda</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <h2>ROI da Sessão</h2>
      <div class="roi-grid" id="roiGrid">
        <div class="roi-item"><label>Tempo Economizado</label><span id="roi-time">—</span></div>
        <div class="roi-item"><label>Valor Gerado</label><span id="roi-value">—</span></div>
        <div class="roi-item"><label>Custo API</label><span id="roi-cost" style="color:var(--yellow)">—</span></div>
        <div class="roi-item"><label>ROI Líquido</label><span id="roi-net">—</span></div>
      </div>
    </div>
    <div class="suggestions" id="suggestionsContainer" style="display:none">
      <div class="card">
        <h2>Sugestões</h2>
        <div id="suggestionsList"></div>
      </div>
    </div>
  </div>
  <script>
    const COLORS = ['#58a6ff','#3fb950','#d29922','#f0883e','#bc8cff','#39c5cf'];
    let catChartInst = null;
    let modelChartInst = null;

    async function load() {
      try {
        const r = await fetch('/api/analytics/metrics');
        const data = await r.json();
        if (data.message) return; // sem dados ainda

        // Tokens por categoria
        const cats = data.tokens_by_category || {};
        if (Object.keys(cats).length) {
          document.getElementById('catNoData').style.display = 'none';
          if (catChartInst) catChartInst.destroy();
          catChartInst = new Chart(document.getElementById('catChart'), {
            type: 'bar',
            data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats),
              backgroundColor: COLORS, borderRadius: 4 }] },
            options: { plugins:{legend:{display:false}}, scales:{y:{ticks:{color:'#7d8590'},grid:{color:'#21262d'}},
              x:{ticks:{color:'#7d8590'},grid:{color:'#21262d'}}}, responsive:true }
          });
        } else {
          document.getElementById('catNoData').style.display = 'block';
        }

        // Modelos
        const dist = data.model_distribution || {};
        if (Object.keys(dist).length) {
          document.getElementById('modelNoData').style.display = 'none';
          if (modelChartInst) modelChartInst.destroy();
          modelChartInst = new Chart(document.getElementById('modelChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(dist), datasets: [{ data: Object.values(dist),
              backgroundColor: COLORS, borderWidth: 0 }] },
            options: { plugins:{legend:{labels:{color:'#e6edf3',font:{size:11}}}}, responsive:true }
          });
        } else {
          document.getElementById('modelNoData').style.display = 'block';
        }

        // ROI
        const roi = data.roi || {};
        const mins = roi.time_saved_minutes || 0;
        document.getElementById('roi-time').textContent = mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}min` : `${mins}min`;
        document.getElementById('roi-value').textContent = `$${(roi.value_generated_usd||0).toFixed(2)}`;
        document.getElementById('roi-cost').textContent = `$${(roi.api_cost_usd||0).toFixed(4)}`;
        document.getElementById('roi-net').textContent = `$${(roi.roi_net_usd||0).toFixed(2)}`;

        // Sugestões
        const sr = await fetch('/api/analytics/suggestions');
        const sdata = await sr.json();
        const sugs = sdata.suggestions || [];
        if (sugs.length) {
          document.getElementById('suggestionsContainer').style.display = 'block';
          document.getElementById('suggestionsList').innerHTML = sugs.map(s =>
            `<div class="suggestion-item"><p>${s.message}</p></div>`
          ).join('');
        }
      } catch(e) { console.error(e); }
    }
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
